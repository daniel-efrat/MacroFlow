<!-- popup/popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>MacroFlow</h1>
            </div>
            <button id="dashboardBtn" class="icon-btn" title="Open Dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <main>
            <div id="authPromptState" class="state-panel" style="gap: 8px;">
                <h3 style="margin: 0;">Cloud Sync</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: 0; margin-bottom: 8px;">Log in to sync your macros, or skip to save locally.</p>
                <input type="email" id="popupAuthEmail" style="width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text-main); font-size: 0.85rem; outline: none;" placeholder="Email">
                <input type="password" id="popupAuthPassword" style="width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text-main); font-size: 0.85rem; outline: none; margin-bottom: 4px;" placeholder="Password">
                <div style="display: flex; gap: 8px; width: 100%;">
                    <button id="popupLoginBtn" class="btn btn-primary" style="flex: 1; padding: 8px;">Login</button>
                    <button id="popupSignupBtn" class="btn btn-outline" style="flex: 1; padding: 8px;">Sign Up</button>
                </div>
                <button id="popupSkipBtn" class="btn" style="background: transparent; color: var(--text-muted); border: 1px dashed var(--border); width: 100%; margin-top: 4px; padding: 8px;">Skip for now</button>
                <div id="popupAuthStatus" class="status-text hidden" style="margin-top: 4px;"></div>
            </div>

            <div id="defaultState" class="state-panel active">
                <button id="startRecordBtn" class="btn btn-record">
                    <span class="dot"></span> Record Macro
                </button>
            </div>

            <div class="macros-section">
                <div class="section-header">
                    <h3>Your Macros</h3>
                </div>
                <div id="macroList" class="macro-list">
                    <!-- Dynamic List -->
                </div>
                <div id="emptyState" class="empty-state">
                    No macros yet. Start recording!
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
